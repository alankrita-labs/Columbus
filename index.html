<!DOCTYPE html>
<html>
<head>
    <title>Columbus: The 1492 Simulation</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Georgia', serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        #map-ui {
            background: #fdf5e6; padding: 25px; border: 5px solid #5d4037; text-align: center;
        }
        button {
            background: #b71c1c; color: #fff; padding: 15px 40px; font-size: 20px; cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="map-ui">
            <h1 style="color: #5d4037;">SCENE I: THE VOYAGE</h1>
            <img src="map.png" style="width: 350px; margin-bottom: 15px; border: 1px solid #000;">
            <br>
            <button onclick="startVoyage()">SET OUT</button>
        </div>
    </div>

    <a-scene renderer="colorManagement: true;">
        <a-assets>
            <a-asset-item id="ship-glb" src="ship.glb"></a-asset-item>
            <a-asset-item id="columbus-glb" src="columbus.glb"></a-asset-item>
            <a-asset-item id="native-glb" src="lucayan.glb"></a-asset-item>
            <a-asset-item id="island-glb" src="island.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane rotation="-90 0 0" width="2000" height="2000" color="#1a5276"></a-plane>
        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="1 10 1" intensity="1" color="#ffd700"></a-light>

        <a-entity id="scene1">
            <a-entity id="cam1" camera position="0 5 15" active="true"></a-entity>
            
            <a-entity id="ship-voyage-rig" position="-40 0 0">
                <a-entity gltf-model="#ship-glb" scale="0.5 0.5 0.5" rotation="0 90 0"></a-entity>
            </a-entity>
        </a-entity>

        <a-entity id="scene2" visible="false" position="0 -1000 0">
            <a-entity id="cam2" camera position="0 1.6 3" active="false"></a-entity>
            
            <a-entity gltf-model="#island-glb" scale="20 20 20" position="0 -0.5 -10"></a-entity>

            <a-circle position="0 0.05 -2" radius="10" color="#f2e3bc" rotation="-90 0 0"></a-circle>

            <a-entity id="character-anchor" position="0 0 -3">
                <a-entity position="-1.5 0 0">
                   <a-entity gltf-model="#columbus-glb" scale="2 2 2" rotation="0 160 0"></a-entity>
                </a-entity>
                
                <a-entity position="1.5 0 0">
                   <a-entity gltf-model="#native-glb" scale="2 2 2" rotation="0 -160 0"></a-entity>
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        function startVoyage() {
            document.getElementById('overlay').classList.add('hidden');
            
            const utter1 = new SpeechSynthesisUtterance("Scene One. The Voyage. August 1492. Columbus sails west across the side-profile of the Atlantic, guided by the logic of the stars.");
            window.speechSynthesis.speak(utter1);

            let shipRig = document.getElementById('ship-voyage-rig');
            let xPos = -40;
            
            let move = setInterval(() => {
                xPos += 0.25;
                shipRig.setAttribute('position', `${xPos} 0 0`);
                
                // When ship passes center, prepare for scene 2
                if (xPos >= 20) {
                    clearInterval(move);
                    finishVoyage();
                }
            }, 50);
        }

        function finishVoyage() {
            // Swap to Scene 2
            document.getElementById('scene1').setAttribute('visible', 'false');
            document.getElementById('cam1').setAttribute('active', 'false');
            
            document.getElementById('scene2').setAttribute('position', '0 0 0');
            document.getElementById('scene2').setAttribute('visible', 'true');
            document.getElementById('cam2').setAttribute('active', 'true');

            const utter2 = new SpeechSynthesisUtterance("Scene Two. Landfall. On the island of Guanahani, Columbus and the Lucayan people meet face-to-face for the first time.");
            window.speechSynthesis.speak(utter2);
        }
    </script>
</body>
</html>
