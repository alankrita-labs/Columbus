<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic Voyage Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: #fff; }
        
        /* Fullscreen containers */
        .layer { position: absolute; inset: 0; width: 100%; height: 100%; }
        
        /* Loading Screen */
        #loading { background: #111; color: #d4af37; display: flex; justify-content: center; align-items: center; font-size: 24px; z-index: 100; transition: opacity 1s; }
        
        /* Scene 1: Map overlay */
        #scene-map { 
            background: url('map.png') center/cover no-repeat, #1a1510; 
            z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; pb-20; transition: opacity 1.5s; 
        }
        
        /* Scene 2 & 3 UI overlays */
        #scene-ui { z-index: 40; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px; opacity: 0; transition: opacity 1s; }
        
        /* Buttons and Text */
        .btn { pointer-events: auto; background: linear-gradient(to bottom, #d4af37, #aa7c11); color: #000; border: 1px solid #ffdf73; padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 50px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        .btn:hover { background: linear-gradient(to bottom, #ffdf73, #d4af37); transform: translateY(-2px); }
        .narration { background: rgba(0,0,0,0.7); padding: 20px 40px; border: 1px solid #d4af37; border-radius: 5px; margin-bottom: 20px; text-align: center; max-width: 800px; font-size: 20px; }
        
        /* 3D Canvas */
        #three-container { z-index: 10; }
    </style>
</head>
<body>
    <div id="loading" class="layer">Loading High-Fidelity Assets (0%)...</div>
    
    <!-- Scene 1: The 2D Map -->
    <div id="scene-map" class="layer">
        <div class="narration">August 1492: The voyage begins. Crossing the vast unknown.</div>
        <button id="btn-sail" class="btn">Set Sail (Enter 3D)</button>
    </div>

    <!-- Scene 2 & 3 UI Overlay -->
    <div id="scene-ui" class="layer">
        <div id="ui-text" class="narration">Sailing across the Atlantic... The island approaches.</div>
        <button id="btn-land" class="btn">Make Landfall (Meet the Lucayans)</button>
    </div>

    <!-- 3D Environment -->
    <div id="three-container" class="layer"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { Water } from 'three/addons/objects/Water.js';

        let scene, camera, renderer, water;
        let shipModel, islandModel, columbusModel, lucayanModel; 
        
        const clock = new THREE.Clock();
        
        // State management
        let currentScene = 1; 
        let shipSpeed = 0.5;

        init();
        animate();

        function init() {
            const container = document.getElementById('three-container');

            // 1. Scene & Camera Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
            
            // Initial camera position (behind the ship)
            camera.position.set(0, 30, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // --- LOADING MANAGER ---
            const manager = new THREE.LoadingManager();
            manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
                document.getElementById('loading').innerText = `Loading Assets (${Math.round((itemsLoaded / itemsTotal) * 100)}%)...`;
            };
            manager.onLoad = function () {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            };
            manager.onError = function ( url ) {
                console.error('Error loading:', url);
                document.getElementById('loading').innerText = "Asset missing. Ensure all .glb, .png, .hdr, and .jpg files are in the same folder.";
            };

            // 2. Load HDRI (Loaded directly from root directory)
            new RGBELoader(manager).load('sunset_sky.hdr', function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
            });

            // 3. Realistic Water Shader (Loaded directly from root directory)
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(waterGeometry, {
                textureWidth: 512,
                textureHeight: 512,
                waterNormals: new THREE.TextureLoader(manager).load('waternormals.jpg', function (texture) {
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                }),
                sunDirection: new THREE.Vector3(1, 1, 1).normalize(),
                sunColor: 0xffffff,
                waterColor: 0x001e0f,
                distortionScale: 3.7,
            });
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // 4. Load Models (Directly from root directory as requested)
            const loader = new GLTFLoader(manager);
            
            // A. Load Ship
            loader.load('ship.glb', function (gltf) {
                shipModel = gltf.scene;
                shipModel.scale.set(5, 5, 5); // Tweak scale based on your model
                shipModel.position.set(0, -2, 0); 
                scene.add(shipModel);
            });

            // B. Load Island
            loader.load('island.glb', function (gltf) {
                islandModel = gltf.scene;
                islandModel.scale.set(50, 50, 50); // Islands are big
                islandModel.position.set(0, -5, -800); // Placed far away initially
                scene.add(islandModel);
            });

            // C. Load Columbus
            loader.load('columbus.glb', function (gltf) {
                columbusModel = gltf.scene;
                columbusModel.scale.set(5, 5, 5); 
                // Position Columbus on the island's shore
                columbusModel.position.set(-10, 0, -780); 
                scene.add(columbusModel);
            });

            // D. Load Lucayan
            loader.load('lucayan.glb', function (gltf) {
                lucayanModel = gltf.scene;
                lucayanModel.scale.set(5, 5, 5); 
                // Position the Lucayan on the shore facing Columbus
                lucayanModel.position.set(10, 0, -785); 
                lucayanModel.lookAt(-10, 0, -780); // Look at Columbus
                scene.add(lucayanModel);
            });

            window.addEventListener('resize', onWindowResize);
            
            // --- UI INTERACTIONS ---
            document.getElementById('btn-sail').addEventListener('click', () => {
                // Transition from Map (Scene 1) to 3D Ship (Scene 2)
                document.getElementById('scene-map').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('scene-map').style.display = 'none';
                    document.getElementById('scene-ui').style.opacity = '1';
                    currentScene = 2;
                }, 1500);
            });

            document.getElementById('btn-land').addEventListener('click', () => {
                // Transition to Landing (Scene 3)
                currentScene = 3;
                document.getElementById('btn-land').style.display = 'none';
                document.getElementById('ui-text').innerText = "October 12, 1492: Columbus makes landfall and meets the Lucayans.";
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Animate realistic water
            if (water) {
                water.material.uniforms['time'].value += 1.0 / 60.0;
            }

            // Scene 2 Logic: Sailing towards the island
            if (currentScene === 2) {
                if (shipModel) {
                    // Ship bobs on the waves
                    shipModel.position.y = Math.sin(time * 1.5) * 1.5 - 2;
                    shipModel.rotation.x = Math.sin(time * 1.2) * 0.05;
                    shipModel.rotation.z = Math.sin(time * 0.8) * 0.05;
                }
                
                // Move island (and characters) closer to simulate sailing
                if (islandModel && islandModel.position.z < -100) {
                    islandModel.position.z += shipSpeed;
                    if (columbusModel) columbusModel.position.z += shipSpeed;
                    if (lucayanModel) lucayanModel.position.z += shipSpeed;
                }
            }

            // Scene 3 Logic: The Meeting
            if (currentScene === 3) {
                // Move camera off the ship and onto the beach to look at the characters
                // Lerp (smoothly interpolate) camera position to the island shore
                camera.position.lerp(new THREE.Vector3(0, 15, -750), 0.02);
                camera.lookAt(0, 5, -785);
                
                // Stop the ship bobbing aggressively since it's "anchored"
                if (shipModel) {
                    shipModel.position.y = Math.sin(time * 1.0) * 0.5 - 2;
                    shipModel.rotation.x = Math.sin(time * 0.5) * 0.02;
                    shipModel.rotation.z = 0;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
