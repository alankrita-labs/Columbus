<!DOCTYPE html>
<html>
<head>
    <title>Columbus: The 1492 Encounter</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Georgia', serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0f0f; z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        #map-ui {
            background: #fdf5e6; padding: 30px; border: 8px double #d4af37;
            text-align: center; box-shadow: 0 0 50px #000;
        }
        button {
            background: #b71c1c; color: #ffd700; padding: 15px 40px;
            font-size: 24px; border: 2px solid #ffd700; cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="map-ui">
            <h1 style="color: #5d4037;">SCENE I: THE VOYAGE</h1>
            <img src="map.png" style="width: 450px; margin-bottom: 20px; border: 1px solid #000;">
            <br>
            <button onclick="startVoyage()">SET OUT</button>
        </div>
    </div>

    <a-scene renderer="colorManagement: true;">
        <a-assets>
            <a-asset-item id="ship-m" src="ship.glb"></a-asset-item>
            <a-asset-item id="columbus-m" src="columbus.glb"></a-asset-item>
            <a-asset-item id="lucayan-m" src="lucayan.glb"></a-asset-item>
            <a-asset-item id="island-m" src="island.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane position="0 -0.1 0" rotation="-90 0 0" width="2000" height="2000" color="#006994"></a-plane>
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="5 10 5" intensity="1.5" color="#ffd700"></a-light>

        <a-entity id="scene1-group">
            <a-entity id="cam1" camera position="30 8 0" rotation="0 90 0" active="true"></a-entity>
            
            <a-entity id="moving-ship-container" position="-60 0 -25">
                <a-entity gltf-model="#ship-m" scale="0.1 0.1 0.1" rotation="0 90 0"></a-entity>
            </a-entity>

            <a-entity gltf-model="#island-m" position="50 -2 -30" scale="2 2 2"></a-entity>
        </a-entity>

        <a-entity id="scene2-group" position="0 -200 0" visible="false">
            <a-entity id="cam2" camera position="0 2 12" rotation="0 0 0" active="false"></a-entity>
            
            <a-entity gltf-model="#island-m" scale="10 10 10" position="0 -1 -10"></a-entity>

            <a-entity id="characters" position="0 0 0">
                <a-entity gltf-model="#columbus-m" position="-4 0 0" scale="1.5 1.5 1.5" rotation="0 160 0"></a-entity>
                
                <a-entity gltf-model="#lucayan-m" position="2 0 -1" scale="1.5 1.5 1.5" rotation="0 -30 0"></a-entity>
                <a-entity gltf-model="#lucayan-m" position="5 0 1" scale="1.5 1.5 1.5" rotation="0 -45 0"></a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        function startVoyage() {
            document.getElementById('overlay').classList.add('hidden');
            
            // Narration 1
            const utter1 = new SpeechSynthesisUtterance("August 1492. Driven by the logic of the fine print of ancient charts, Columbus leads his fleet into the unknown Atlantic. They sail for thirty-three days, moving toward a horizon they hope reveals the East.");
            utter1.rate = 0.9;
            window.speechSynthesis.speak(utter1);

            // Animate Side Profile (Scene 1)
            let ship = document.getElementById('moving-ship-container');
            let x = -60;
            let move = setInterval(() => {
                x += 0.25;
                ship.setAttribute('position', `${x} 0 -25`);
                if (x >= 20) {
                    clearInterval(move);
                    goToScene2();
                }
            }, 50);
        }

        function goToScene2() {
            // Swap Cameras & Groups
            document.getElementById('cam1').setAttribute('active', false);
            document.getElementById('scene1-group').setAttribute('visible', false);
            
            document.getElementById('scene2-group').setAttribute('position', '0 0 0');
            document.getElementById('scene2-group').setAttribute('visible', true);
            document.getElementById('cam2').setAttribute('active', true);

            // Narration 2
            const utter2 = new SpeechSynthesisUtterance("October 12th. Landfall at Guanahani. On these vibrant shores, the Old World meets the New. Columbus encounters the Lucayan people—a moment of first contact that would reshape the map of human history forever.");
            utter2.rate = 0.9;
            window.speechSynthesis.speak(utter2);
        }
    </script>
</body>
</html>
