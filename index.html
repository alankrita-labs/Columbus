<!DOCTYPE html>
<html>
<head>
    <title>Columbus Simulation: The Landing</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Georgia', serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #map-box {
            border: 6px solid #d4af37; background: #fdf5e6; padding: 20px;
            text-align: center; box-shadow: 0 0 30px #000;
        }
        button {
            background: #8b0000; color: #ffd700; padding: 12px 35px;
            font-size: 20px; border: 2px solid #ffd700; cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="map-box">
            <h2 style="color: #5d4037;">VOYAGE DATA</h2>
            <img src="map.png" style="width: 400px; border: 1px solid #333; margin-bottom: 15px;">
            <br>
            <button onclick="startSim()">SET OUT</button>
        </div>
    </div>

    <a-scene>
    <a-assets>
        <a-asset-item id="ship-model" src="ship.glb"></a-asset-item>
    </a-assets>

    <a-sky color="#87CEEB"></a-sky>
    <a-plane position="0 0 0" rotation="-90 0 0" width="2000" height="2000" color="#1a5276"></a-plane>
    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" position="1 10 1" intensity="1"></a-light>

    <a-entity id="ship-wrapper" position="0 0 0">
        <a-entity id="actual-ship" gltf-model="#ship-model" position="0 0 -5" scale="0.1 0.1 0.1">
            <a-box color="yellow" wireframe="true" scale="5 2 10" opacity="0.5"></a-box>
        </a-entity>
        
        <a-entity id="camera-rig" camera look-controls position="0 1.6 0"></a-entity>
    </a-entity>

    <a-entity id="island-goal" position="0 -1 -150">
        <a-circle radius="50" color="#eedc82" rotation="-90 0 0"></a-circle>
        
        <a-entity position="0 0 -10">
            <a-cylinder position="-3 1 0" radius="0.4" height="2" color="#ffd700"></a-cylinder>
            <a-cylinder position="0 1 0" radius="0.4" height="2" color="#ffd700"></a-cylinder>
            <a-cylinder position="3 1 0" radius="0.4" height="2" color="#ffd700"></a-cylinder>
            <a-text value="Lucayan People" align="center" position="0 3 0" color="#000" width="10"></a-text>
        </a-entity>
    </a-entity>
</a-scene>

    <script>
        function startSim() {
    document.getElementById('overlay').classList.add('hidden');

    // Informational Narration
    const msg = "The logic of the voyage: sailing west to reach the east. After 33 days, the crew approaches Guanahani.";
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(msg));

    let shipWrapper = document.getElementById('ship-wrapper');
    let currentZ = 0;

    // Movement Logic
    let voyage = setInterval(() => {
        currentZ -= 0.5; // Move FORWARD into the scene
        shipWrapper.setAttribute('position', `0 0 ${currentZ}`);

        // Reality Check: Are we at the island?
        if (currentZ <= -135) {
            clearInterval(voyage);
            arrival();
        }
    }, 50);
}

function arrival() {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Arrival. October 12, 1492. Meeting the Lucayan people."));
}
    </script>
</body>
</html>
