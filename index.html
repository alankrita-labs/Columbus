<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic Voyage Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #loading { position: absolute; inset: 0; background: #111; color: #d4af37; display: flex; justify-content: center; align-items: center; font-family: serif; font-size: 24px; z-index: 100; transition: opacity 1s; }
    </style>
</head>
<body>
    <div id="loading">Loading High-Fidelity Assets (0%)...</div>
    <div id="three-container"></div>

    <!-- Import Three.js and necessary loaders as ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { Water } from 'three/addons/objects/Water.js';

        let scene, camera, renderer, water, shipModel;
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            const container = document.getElementById('three-container');

            // 1. Scene & Camera Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.set(30, 30, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Cinematic lighting
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // 2. Load HDRI for Photorealistic Lighting & Skybox
            // REQUIRED: Download a .hdr file from Polyhaven and place it in a 'textures' folder
            new RGBELoader().setPath('textures/').load('sunset_sky.hdr', function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
            });

            // 3. Realistic Water Shader
            // REQUIRED: Download a water normal map texture
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(waterGeometry, {
                textureWidth: 512,
                textureHeight: 512,
                waterNormals: new THREE.TextureLoader().load('textures/waternormals.jpg', function (texture) {
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                }),
                sunDirection: new THREE.Vector3(1, 1, 1).normalize(),
                sunColor: 0xffffff,
                waterColor: 0x001e0f,
                distortionScale: 3.7,
            });
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // 4. Load External High-Fidelity 3D Model
            // REQUIRED: Download a .glb caravel model from Sketchfab
            const loader = new GLTFLoader();
            loader.load(
                'models/caravel.glb', 
                function (gltf) {
                    shipModel = gltf.scene;
                    
                    // Center and scale the model depending on its original size
                    shipModel.scale.set(10, 10, 10);
                    shipModel.position.y = -2; 
                    
                    scene.add(shipModel);
                    
                    // Hide loading screen
                    document.getElementById('loading').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading').remove(), 1000);
                },
                function (xhr) {
                    document.getElementById('loading').innerText = `Loading Assets (${Math.round(xhr.loaded / xhr.total * 100)}%)...`;
                },
                function (error) {
                    console.error('Error loading model:', error);
                    document.getElementById('loading').innerText = "Error: Check if models/caravel.glb exists.";
                }
            );

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Animate realistic water
            if (water) {
                water.material.uniforms['time'].value += 1.0 / 60.0;
            }

            // Bob the ship gently on the waves
            if (shipModel) {
                shipModel.position.y = Math.sin(time * 1.5) * 1.5 - 2;
                shipModel.rotation.x = Math.sin(time * 1.2) * 0.05;
                shipModel.rotation.z = Math.sin(time * 0.8) * 0.05;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
