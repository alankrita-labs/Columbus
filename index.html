<!DOCTYPE html>
<html>
<head>
    <title>Columbus: The 1492 Simulation</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Garamond', serif; overflow: hidden; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #map-frame {
            border: 10px solid #5d4037; background: #f2e3bc; padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); text-align: center;
        }
        #map-img { width: 500px; max-width: 80vw; display: block; margin-bottom: 20px; }
        button {
            background: #d32f2f; color: white; padding: 15px 40px;
            font-size: 24px; border: none; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #b71c1c; transform: scale(1.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="map-frame">
            <h1 style="color: #5d4037;">The Ocean Blue - 1492</h1>
            <img id="map-img" src="map.png" alt="Voyage Map">
            <button onclick="launchSimulation()">SET OUT</button>
        </div>
    </div>

    <a-scene>
        <a-assets>
            <a-asset-item id="caravel" src="ship.glb"></a-asset-item>
        </a-assets>

        <a-entity id="main-env" environment="preset: ocean; skyColor: #ff9e80; horizonColor: #004d40; dressingAmount: 0"></a-entity>
        
        <a-entity id="voyage-group" position="0 0 0">
            <a-entity gltf-model="#caravel" scale="1 1 1" position="0 0.2 -5"></a-entity>
            <a-entity camera look-controls position="0 1.6 0"></a-entity>
        </a-entity>

        <a-entity id="island-target" position="0 -1 -200">
            <a-circle radius="40" color="#f2e3bc" rotation="-90 0 0"></a-circle>
            
            <a-entity position="0 0 -5">
                <a-cylinder position="-2 1 0" radius="0.3" height="2" color="#FFD700"></a-cylinder>
                <a-cylinder position="0 1 -1" radius="0.3" height="2" color="#FFD700"></a-cylinder>
                <a-cylinder position="2 1 0" radius="0.3" height="2" color="#FFD700"></a-cylinder>
                <a-text value="Native Greeting" align="center" position="0 2.5 0" color="#FFF"></a-text>
            </a-entity>

            <a-cone position="-10 3 -10" radius-bottom="0.5" height="6" color="#3e2723"></a-cone>
            <a-sphere position="-10 6 -10" radius="2" color="#228b22"></a-sphere>
        </a-entity>

    </a-scene>

    <script>
        function launchSimulation() {
            // Hide the UI
            document.getElementById('overlay').classList.add('hidden');

            // Narration: Providing Information (Not Monologue)
            const voyageInfo = "In 1492, Christopher Columbus set sail from Palos, Spain, seeking a westward route to Asia. After thirty-three days at sea, his fleet reached the Lucayan Islands in the present-day Bahamas. This was a moment of profound transformation for global geography and human history.";
            
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(voyageInfo);
            utter.rate = 0.9;
            utter.pitch = 0.8;
            synth.speak(utter);

            // The Simulation Movement Logic
            let island = document.getElementById('island-target');
            let env = document.getElementById('main-env');
            let posZ = -200;

            // Animate the island approaching (The Voyage)
            let moveInterval = setInterval(() => {
                posZ += 0.5; // Speed of the voyage
                island.setAttribute('position', `0 -1 ${posZ}`);

                // Arrival Logic
                if (posZ >= -15) {
                    clearInterval(moveInterval);
                    arrival();
                }
            }, 50);
        }

        function arrival() {
            // Change atmosphere to Tropical Forest for the island arrival
            document.getElementById('main-env').setAttribute('environment', 'preset: forest; lighting: morning');
            
            const arrivalText = "Land Ho. The crew arrives at Guanahani. They encounter the Lucayan people, beginning an exchange of culture and resources that would reshape the world.";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(arrivalText));
        }
    </script>
</body>
</html>
