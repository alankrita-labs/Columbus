<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- STRICT MOBILE VIEWPORT: Prevents zooming and scrolling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photorealistic Voyage Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: #fff; touch-action: none; }
        
        .layer { position: absolute; inset: 0; width: 100%; height: 100%; }
        
        #loading { background: #111; color: #d4af37; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 20px; z-index: 100; transition: opacity 1s; text-align: center; padding: 20px; }
        #loading-text { margin-top: 15px; font-size: 16px; color: #aaa; }
        
        /* Scene 1: Map overlay */
        #scene-map { 
            background-color: #050402;
            background-image: url('map.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 50; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 80px; transition: opacity 1.5s; 
        }
        
        /* Scene 2 & 3 UI overlays */
        #scene-ui { z-index: 40; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px; opacity: 0; transition: opacity 1s; }
        
        /* Mobile-friendly buttons */
        .btn { pointer-events: auto; background: linear-gradient(to bottom, #d4af37, #aa7c11); color: #000; border: 1px solid #ffdf73; padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); border-radius: 8px; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: #ffdf73; transform: scale(0.95); }
        
        #three-container { z-index: 10; }
    </style>
</head>
<body>
    <div id="loading" class="layer">
        <div>Loading High-Fidelity Assets...</div>
        <div id="loading-text">0%</div>
    </div>
    
    <div id="scene-map" class="layer">
        <button id="btn-sail" class="btn">Set Sail (Enter 3D)</button>
    </div>

    <div id="scene-ui" class="layer">
        <button id="btn-land" class="btn">Make Landfall</button>
    </div>

    <div id="three-container" class="layer"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { Water } from 'three/addons/objects/Water.js';

        let scene, camera, renderer, water, particles;
        let mainShip, companionShip;
        let islandGroup, islandModel, columbusModel, lucayanModel, flagMesh, flagPole; 
        
        const clock = new THREE.Clock();
        let currentScene = 1; 
        let shipSpeed = 1.2;

        let cameraTarget = new THREE.Vector3(0, 20, 50);
        let lookAtTarget = new THREE.Vector3(0, 5, 0);
        let currentLookAt = new THREE.Vector3(0, 5, 0);

        init();
        animate();

        function init() {
            const container = document.getElementById('three-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a2b3c, 0.0004); 

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.copy(cameraTarget);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "default" }); 
            
            // MOBILE FIX: Cap pixel ratio at 1.5 to prevent memory crashes on Retina displays
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.1;
            container.appendChild(renderer.domElement);

            // --- LIGHTING ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
            scene.add(ambientLight);
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
            scene.add(hemiLight);
            const sunLight = new THREE.DirectionalLight(0xffdfb3, 2.5);
            sunLight.position.set(200, 150, 100);
            scene.add(sunLight);

            // --- SPECIAL EFFECTS: Glowing Orbs ---
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 200; // Reduced for mobile CPU, keeping it subtle
            const posArray = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 400;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const particleCanvas = document.createElement('canvas');
            particleCanvas.width = 32; particleCanvas.height = 32;
            const pCtx = particleCanvas.getContext('2d');
            const pGrad = pCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
            pGrad.addColorStop(0, 'rgba(255,255,255,1)');
            pGrad.addColorStop(0.2, 'rgba(255,204,68,1)');
            pGrad.addColorStop(1, 'rgba(0,0,0,0)');
            pCtx.fillStyle = pGrad;
            pCtx.fillRect(0,0,32,32);
            const particleTexture = new THREE.CanvasTexture(particleCanvas);

            const particleMat = new THREE.PointsMaterial({
                size: 2.0,
                map: particleTexture,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                depthWrite: false 
            });
            particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);

            islandGroup = new THREE.Group();
            islandGroup.position.set(0, 0, -3000); 
            scene.add(islandGroup);

            // --- LOADING MANAGER ---
            const manager = new THREE.LoadingManager();
            manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
                const percent = Math.round((itemsLoaded / itemsTotal) * 100);
                document.getElementById('loading-text').innerText = `${percent}% (${url.split('/').pop()})`;
            };
            manager.onLoad = function () {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            };
            manager.onError = function ( url ) {
                document.getElementById('loading-text').innerText = `Error loading: ${url.split('/').pop()}`;
            };

            // 2. Load HDRI
            new RGBELoader(manager).load('sunset_sky.hdr', function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
                scene.fog.color.setHex(0x8a5a44); 
            });

            // 3. Water
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(waterGeometry, {
                textureWidth: 256, // Halved for mobile performance
                textureHeight: 256,
                waterNormals: new THREE.TextureLoader(manager).load('waternormals.jpg', function (texture) {
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                }),
                sunDirection: new THREE.Vector3(1, 1, 1).normalize(),
                sunColor: 0xffdfb3,
                waterColor: 0x001e0f,
                distortionScale: 3.7,
            });
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // 4. Load Models
            const loader = new GLTFLoader(manager);
            
            loader.load('ship.glb', function (gltf) {
                mainShip = gltf.scene;
                mainShip.scale.set(5, 5, 5); 
                mainShip.position.set(0, -2, 0); 
                scene.add(mainShip);

                companionShip = mainShip.clone();
                companionShip.position.set(-25, -2, -15); 
                companionShip.rotation.y = 0.05; 
                scene.add(companionShip);
            });

            loader.load('island.glb', function (gltf) {
                islandModel = gltf.scene;
                islandModel.scale.set(50, 50, 50); 
                islandModel.position.set(0, -5, 0); 
                islandGroup.add(islandModel);
            });

            loader.load('columbus.glb', function (gltf) {
                columbusModel = gltf.scene;
                columbusModel.scale.set(5, 5, 5); 
                // Planted firmly on the sand based on previous adjustments
                columbusModel.position.set(-15, 6.5, 80); 
                columbusModel.visible = false; 
                islandGroup.add(columbusModel);
            });

            loader.load('lucayan.glb', function (gltf) {
                lucayanModel = gltf.scene;
                lucayanModel.scale.set(5, 5, 5); 
                // Planted firmly on the sand
                lucayanModel.position.set(15, 6.5, 70); 
                lucayanModel.lookAt(-15, 6.5, 80); 
                lucayanModel.visible = false; 
                islandGroup.add(lucayanModel);
            });

            createSpanishFlag();

            window.addEventListener('resize', onWindowResize);
            
            // --- UI INTERACTIONS ---
            const sailBtn = document.getElementById('btn-sail');
            const landBtn = document.getElementById('btn-land');

            const triggerSail = (e) => {
                e.preventDefault();
                document.getElementById('scene-map').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('scene-map').style.display = 'none';
                    document.getElementById('scene-ui').style.opacity = '1';
                    currentScene = 2;
                }, 1500);
            };

            const triggerLand = (e) => {
                e.preventDefault();
                currentScene = 3;
                document.getElementById('btn-land').style.display = 'none';

                islandGroup.position.z = -80;
                
                if (columbusModel) columbusModel.visible = true;
                if (lucayanModel) lucayanModel.visible = true;
                if (flagPole) flagPole.visible = true;
                if (flagMesh) flagMesh.visible = true;
            };

            sailBtn.addEventListener('click', triggerSail);
            sailBtn.addEventListener('touchstart', triggerSail);
            
            landBtn.addEventListener('click', triggerLand);
            landBtn.addEventListener('touchstart', triggerLand);
        }

        function createSpanishFlag() {
            const poleGeo = new THREE.CylinderGeometry(0.2, 0.2, 15);
            const poleMat = new THREE.MeshStandardMaterial({color: 0x8b5a2b});
            flagPole = new THREE.Mesh(poleGeo, poleMat);
            // Lowered pole base to match characters
            flagPole.position.set(-20, 13, 80); 
            flagPole.visible = false; 
            islandGroup.add(flagPole);

            const flagTexCanvas = document.createElement('canvas');
            flagTexCanvas.width = 256; flagTexCanvas.height = 128;
            const ctx = flagTexCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,256,128);
            ctx.fillStyle = '#cc0000'; 
            ctx.fillRect(110,0,36,128); 
            ctx.fillRect(0,46,256,36);  
            const flagTex = new THREE.CanvasTexture(flagTexCanvas);

            const flagGeo = new THREE.PlaneGeometry(8, 5, 10, 10);
            const flagMat = new THREE.MeshStandardMaterial({ map: flagTex, side: THREE.DoubleSide });
            flagMesh = new THREE.Mesh(flagGeo, flagMat);
            // Lowered flag cloth
            flagMesh.position.set(-16, 18, 80); 
            flagMesh.visible = false; 
            islandGroup.add(flagMesh);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (water) water.material.uniforms['time'].value += 1.0 / 60.0;

            if (particles) {
                particles.rotation.y = time * 0.05;
                particles.position.z += 0.2;
                if (particles.position.z > 100) particles.position.z = -200; 
            }

            if (flagMesh && flagMesh.visible) {
                const pos = flagMesh.geometry.attributes.position;
                for(let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    pos.setZ(i, Math.sin(x * 1.5 - time * 5) * 0.8);
                }
                flagMesh.geometry.computeVertexNormals();
                flagMesh.geometry.attributes.position.needsUpdate = true;
            }

            if (currentScene === 2) {
                // EXAGGERATED BOBBING for the deep ocean in Scene 2
                const heavyBobbing = Math.sin(time * 1.5) * 3.0; // Doubled amplitude
                cameraTarget.set(0, 18 + heavyBobbing, 45);
                lookAtTarget.set(0, 5 + heavyBobbing, -20);

                if (islandGroup && islandGroup.position.z < -80) {
                    islandGroup.position.z += shipSpeed;
                }
            }

            if (currentScene === 3) {
                // NORMAL BOBBING: Calmer since we are anchored near land
                const bobbingAmount = Math.sin(time * 1.5) * 1.5;
                // CAMERA ADJUST: Kept exactly the same as Scene 2's original state
                cameraTarget.set(0, 18 + bobbingAmount, 45);
                lookAtTarget.set(0, 5 + bobbingAmount, -20);

                if (mainShip) {
                    mainShip.position.y = Math.sin(time * 1.0) * 0.3 - 2;
                    mainShip.rotation.x = Math.sin(time * 0.5) * 0.01;
                    mainShip.rotation.z = 0;
                }
                if (companionShip) {
                    companionShip.position.y = Math.sin(time * 1.0 + 1) * 0.3 - 2;
                    companionShip.rotation.x = Math.sin(time * 0.5 + 1) * 0.01;
                    companionShip.rotation.z = -0.05;
                }
            }

            if (currentScene === 2) {
                if (mainShip) {
                    // EXAGGERATED SHIP PITCH AND ROLL
                    mainShip.position.y = Math.sin(time * 1.5) * 3.0 - 2; // Steeper waves
                    mainShip.rotation.x = Math.sin(time * 1.2) * 0.12;    // More pitch
                    mainShip.rotation.z = Math.sin(time * 0.8) * 0.1;     // More roll
                }
                if (companionShip) {
                    companionShip.position.y = Math.sin(time * 1.5 + 1) * 3.0 - 2;
                    companionShip.rotation.x = Math.sin(time * 1.2 + 1) * 0.12;
                    companionShip.rotation.z = Math.sin(time * 0.8 + 1) * 0.1 - 0.05;
                }
            }

            camera.position.lerp(cameraTarget, 0.02);
            currentLookAt.lerp(lookAtTarget, 0.02);
            camera.lookAt(currentLookAt);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
