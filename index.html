<!DOCTYPE html>
<html>
  <head>
    <title>Columbus VR: The Logical Voyage</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse">
      
      <a-assets>
        <img id="wood" src="https://cdn.pixabay.com/photo/2016/11/21/17/41/wood-1846738_1280.jpg">
        <audio id="ocean-sound" src="https://www.soundjay.com/nature/ocean-wave-1.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: ocean; skyType: gradient; skyColor: #ff8c00; horizonColor: #4682b4; lighting: point; lightPosition: 0 5 0"></a-entity>
      <a-sound src="#ocean-sound" autoplay="true" loop="true" position="0 2 5"></a-sound>

      <a-entity id="ship-deck" position="0 0.2 -5">
        <a-box width="6" depth="12" height="0.5" src="#wood" repeat="2 4"></a-box>
        
        <a-cylinder id="compass" position="0 1 -2" radius="0.3" height="0.1" color="#FFD700" 
                    animation__click="property: rotation; to: 0 360 0; dur: 1000; startEvents: click">
            <a-text value="LOGIC CHECK" align="center" position="0 0.1 0" rotation="-90 0 0" color="#000" width="2"></a-text>
        </a-cylinder>

        <a-box id="logbook" position="1.5 1 -1" width="0.5" depth="0.7" height="0.1" color="#f5f5dc">
            <a-text id="log-text" value="Oct 11: Logic suggests land." align="center" position="0 0.1 0" rotation="-90 0 0" color="#333" width="1.5"></a-text>
        </a-box>
      </a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor color="#FF0000"></a-cursor>
      </a-entity>

    </a-scene>

    <script>
      // SCRIPTING THE "GAME" LOGIC
      const compass = document.querySelector('#compass');
      const logText = document.querySelector('#log-text');
      let clickCount = 0;

      // Event Listener for the Compass (The Navigation Puzzle)
      compass.addEventListener('click', () => {
        clickCount++;
        
        if(clickCount === 1) {
          logText.setAttribute('value', "Calculated: 700 leagues.");
        } else if (clickCount === 2) {
          logText.setAttribute('value', "Warning: Compass variance!");
          // Visual feedback: Shake the deck (The Reality Check)
          document.querySelector('#ship-deck').emit('shake'); 
        } else {
          logText.setAttribute('value', "LAND HO! (Oct 12)");
          document.body.style.backgroundColor = "#fff"; // Simulation complete
        }
      });
    </script>
  </body>
</html>
