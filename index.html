<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic Voyage Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: #fff; }
        
        /* Fullscreen containers */
        .layer { position: absolute; inset: 0; width: 100%; height: 100%; }
        
        /* Loading Screen */
        #loading { background: #111; color: #d4af37; display: flex; justify-content: center; align-items: center; font-size: 24px; z-index: 100; transition: opacity 1s; }
        
        /* Scene 1: Map overlay */
        #scene-map { 
            background-color: #050402;
            background-image: url('map.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 50; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 80px; transition: opacity 1.5s; 
        }
        
        /* Scene 2 & 3 UI overlays */
        #scene-ui { z-index: 40; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px; opacity: 0; transition: opacity 1s; }
        
        /* Buttons and Text */
        .btn { pointer-events: auto; background: linear-gradient(to bottom, #d4af37, #aa7c11); color: #000; border: 1px solid #ffdf73; padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 50px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        .btn:hover { background: linear-gradient(to bottom, #ffdf73, #d4af37); transform: translateY(-2px); }
        .narration { background: rgba(0,0,0,0.8); padding: 20px 40px; border: 1px solid #d4af37; border-radius: 5px; margin-bottom: 20px; text-align: center; max-width: 800px; font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        /* 3D Canvas */
        #three-container { z-index: 10; }
    </style>
</head>
<body>
    <div id="loading" class="layer">Loading High-Fidelity Assets (0%)...</div>
    
    <!-- Scene 1: The 2D Map -->
    <div id="scene-map" class="layer">
        <div class="narration">August 1492: Leaving the known world behind. Crossing the vast, terrifying ocean.</div>
        <button id="btn-sail" class="btn">Set Sail (Enter 3D)</button>
    </div>

    <!-- Scene 2 & 3 UI Overlay -->
    <div id="scene-ui" class="layer">
        <div id="ui-text" class="narration">Sailing the deep Atlantic... Land slowly approaches on the horizon.</div>
        <button id="btn-land" class="btn">Make Landfall (Meet the Lucayans)</button>
    </div>

    <!-- 3D Environment -->
    <div id="three-container" class="layer"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { Water } from 'three/addons/objects/Water.js';

        let scene, camera, renderer, water, particles, seagulls;
        let mainShip, companionShip;
        let islandGroup, islandModel, columbusModel, lucayanModel, flagMesh, flagPole; 
        
        const clock = new THREE.Clock();
        
        // State management
        let currentScene = 1; 
        let shipSpeed = 1.2;

        // Camera Tracking Variables
        let cameraTarget = new THREE.Vector3(0, 20, 50);
        let lookAtTarget = new THREE.Vector3(0, 5, 0);
        let currentLookAt = new THREE.Vector3(0, 5, 0);

        init();
        animate();

        function init() {
            const container = document.getElementById('three-container');

            // 1. Scene & Camera Setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a2b3c, 0.0004);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.copy(cameraTarget);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.1;
            container.appendChild(renderer.domElement);

            // --- LIGHTING ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
            scene.add(hemiLight);

            const sunLight = new THREE.DirectionalLight(0xffdfb3, 2.5);
            sunLight.position.set(200, 150, 100);
            scene.add(sunLight);

            // --- SPECIAL EFFECTS 1: Magical Ocean Particles (Subtle & Small) ---
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 300; // Reduced for subtlety
            const posArray = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 400; 
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const particleCanvas = document.createElement('canvas');
            particleCanvas.width = 32; particleCanvas.height = 32;
            const pCtx = particleCanvas.getContext('2d');
            const pGrad = pCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
            pGrad.addColorStop(0, 'rgba(255,255,255,1)');
            pGrad.addColorStop(0.2, 'rgba(255,204,68,1)'); 
            pGrad.addColorStop(1, 'rgba(0,0,0,0)');
            pCtx.fillStyle = pGrad;
            pCtx.fillRect(0,0,32,32);
            const particleTexture = new THREE.CanvasTexture(particleCanvas);

            const particleMat = new THREE.PointsMaterial({
                size: 1.2, // Much smaller
                map: particleTexture,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false 
            });
            particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);

            // --- SPECIAL EFFECTS 2: Circling Seagulls ---
            seagulls = new THREE.Group();
            const birdGeo = new THREE.BufferGeometry();
            // Simple V shape for birds
            const birdVerts = new Float32Array([ -0.5, 0.5, 0,  0, 0, 0,  0.5, 0.5, 0 ]);
            birdGeo.setAttribute('position', new THREE.BufferAttribute(birdVerts, 3));
            const birdMat = new THREE.LineBasicMaterial({ color: 0xffffff });
            
            for(let i = 0; i < 10; i++) {
                const bird = new THREE.Line(birdGeo, birdMat);
                bird.position.set((Math.random() - 0.5) * 40, 15 + Math.random() * 15, (Math.random() - 0.5) * 40);
                bird.userData = {
                    angle: Math.random() * Math.PI * 2,
                    radius: 10 + Math.random() * 30,
                    speed: 0.5 + Math.random() * 0.8,
                    yOffset: bird.position.y
                };
                seagulls.add(bird);
            }
            scene.add(seagulls);

            // --- MASTER GROUP FOR ISLAND & CHARACTERS ---
            islandGroup = new THREE.Group();
            islandGroup.position.set(0, 0, -3000); 
            scene.add(islandGroup);

            // --- LOADING MANAGER ---
            const manager = new THREE.LoadingManager();
            manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
                document.getElementById('loading').innerText = `Loading Assets (${Math.round((itemsLoaded / itemsTotal) * 100)}%)...`;
            };
            manager.onLoad = function () {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            };
            manager.onError = function ( url ) {
                console.error('Error loading:', url);
                document.getElementById('loading').innerText = "Asset missing. Ensure all files are in the same folder.";
            };

            // 2. Load HDRI
            new RGBELoader(manager).load('sunset_sky.hdr', function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
                scene.fog.color.setHex(0x8a5a44); 
            });

            // 3. Realistic Water Shader
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(waterGeometry, {
                textureWidth: 512,
                textureHeight: 512,
                waterNormals: new THREE.TextureLoader(manager).load('waternormals.jpg', function (texture) {
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                }),
                sunDirection: new THREE.Vector3(1, 1, 1).normalize(),
                sunColor: 0xffdfb3,
                waterColor: 0x001e0f,
                distortionScale: 3.7,
            });
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // 4. Load Models
            const loader = new GLTFLoader(manager);
            
            // A. Load Main Ship & Companion Ship
            loader.load('ship.glb', function (gltf) {
                mainShip = gltf.scene;
                mainShip.scale.set(5, 5, 5); 
                mainShip.position.set(0, -2, 0); 
                scene.add(mainShip);

                // Companion ship - Moved firmly into the foreground left
                companionShip = mainShip.clone();
                companionShip.position.set(-15, -2, 5); 
                companionShip.rotation.y = 0.05; 
                scene.add(companionShip);
            });

            // B. Load Island
            loader.load('island.glb', function (gltf) {
                islandModel = gltf.scene;
                islandModel.scale.set(50, 50, 50); 
                islandModel.position.set(0, -5, 0); 
                islandGroup.add(islandModel);
            });

            // C. Load Columbus
            loader.load('columbus.glb', function (gltf) {
                columbusModel = gltf.scene;
                columbusModel.scale.set(5, 5, 5); 
                // Lowered down to 12 so he is standing on the land
                columbusModel.position.set(-15, 12, 80); 
                columbusModel.visible = false; // Hidden until Scene 3
                islandGroup.add(columbusModel);
            });

            // D. Load Lucayan
            loader.load('lucayan.glb', function (gltf) {
                lucayanModel = gltf.scene;
                lucayanModel.scale.set(5, 5, 5); 
                // Lowered down to 12
                lucayanModel.position.set(15, 12, 70); 
                lucayanModel.lookAt(-15, 12, 80); // Look at Columbus
                lucayanModel.visible = false; // Hidden until Scene 3
                islandGroup.add(lucayanModel);
            });

            // E. Create the Spanish Flag & Pole
            createSpanishFlag();

            window.addEventListener('resize', onWindowResize);
            
            // --- UI INTERACTIONS ---
            document.getElementById('btn-sail').addEventListener('click', () => {
                document.getElementById('scene-map').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('scene-map').style.display = 'none';
                    document.getElementById('scene-ui').style.opacity = '1';
                    currentScene = 2;
                }, 1500);
            });

            document.getElementById('btn-land').addEventListener('click', () => {
                currentScene = 3;
                document.getElementById('btn-land').style.display = 'none';
                document.getElementById('ui-text').innerText = "October 12, 1492: Columbus makes landfall and meets the Lucayans.";

                // Snap the island into place
                islandGroup.position.z = -80;
                
                // Unhide the characters and flag
                if (columbusModel) columbusModel.visible = true;
                if (lucayanModel) lucayanModel.visible = true;
                if (flagPole) flagPole.visible = true;
                if (flagMesh) flagMesh.visible = true;
            });
        }

        function createSpanishFlag() {
            const poleGeo = new THREE.CylinderGeometry(0.2, 0.2, 15);
            const poleMat = new THREE.MeshStandardMaterial({color: 0x8b5a2b});
            flagPole = new THREE.Mesh(poleGeo, poleMat);
            // Lowered to match Columbus
            flagPole.position.set(-20, 19, 80); 
            flagPole.visible = false; // Hidden until Scene 3
            islandGroup.add(flagPole);

            const flagTexCanvas = document.createElement('canvas');
            flagTexCanvas.width = 256; flagTexCanvas.height = 128;
            const ctx = flagTexCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,256,128);
            ctx.fillStyle = '#cc0000'; 
            ctx.fillRect(110,0,36,128); 
            ctx.fillRect(0,46,256,36);  
            const flagTex = new THREE.CanvasTexture(flagTexCanvas);

            const flagGeo = new THREE.PlaneGeometry(8, 5, 10, 10);
            const flagMat = new THREE.MeshStandardMaterial({ map: flagTex, side: THREE.DoubleSide });
            flagMesh = new THREE.Mesh(flagGeo, flagMat);
            flagMesh.position.set(-16, 24, 80); 
            flagMesh.visible = false; // Hidden until Scene 3
            islandGroup.add(flagMesh);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (water) water.material.uniforms['time'].value += 1.0 / 60.0;

            // Animate Magic Particles
            if (particles) {
                particles.rotation.y = time * 0.05;
                particles.position.z += 0.2;
                if (particles.position.z > 100) particles.position.z = -200; 
            }

            // Animate Seagulls
            if (seagulls && currentScene === 2) {
                seagulls.visible = true;
                seagulls.children.forEach(bird => {
                    bird.userData.angle += 0.01 * bird.userData.speed;
                    bird.position.x = Math.cos(bird.userData.angle) * bird.userData.radius;
                    bird.position.z = Math.sin(bird.userData.angle) * bird.userData.radius;
                    bird.position.y = bird.userData.yOffset + Math.sin(time * 2 + bird.userData.angle) * 2;
                    bird.rotation.y = -bird.userData.angle; 
                    
                    // Dynamic wing flapping
                    const positions = bird.geometry.attributes.position.array;
                    positions[1] = 0.5 + Math.sin(time * 10 * bird.userData.speed) * 0.5; // Left wing
                    positions[7] = 0.5 + Math.sin(time * 10 * bird.userData.speed) * 0.5; // Right wing
                    bird.geometry.attributes.position.needsUpdate = true;
                });
            } else if (seagulls) {
                seagulls.visible = false; // Hide birds during landing
            }

            // Animate Waving Flag
            if (flagMesh && flagMesh.visible) {
                const pos = flagMesh.geometry.attributes.position;
                for(let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    pos.setZ(i, Math.sin(x * 1.5 - time * 5) * 0.8);
                }
                flagMesh.geometry.computeVertexNormals();
                flagMesh.geometry.attributes.position.needsUpdate = true;
            }

            // --- SCENE 2 LOGIC (Sailing) ---
            if (currentScene === 2) {
                // CAMERA BOBBING: Camera sways and bobs with the exact rhythm of the ship!
                const bobbingAmount = Math.sin(time * 1.5) * 1.5;
                cameraTarget.set(0, 18 + bobbingAmount, 45);
                lookAtTarget.set(0, 5 + bobbingAmount, -20);

                if (islandGroup && islandGroup.position.z < -80) {
                    islandGroup.position.z += shipSpeed;
                }
            }

            // --- SCENE 3 LOGIC (Landing & Cinematic Camera) ---
            if (currentScene === 3) {
                // Camera glides onto the beach, matched perfectly to the new lowered Y=12 height
                cameraTarget.set(0, 18, 20); 
                // Focuses firmly on the characters and the flag
                lookAtTarget.set(-2, 14, 80); 

                if (mainShip) {
                    mainShip.position.y = Math.sin(time * 1.0) * 0.3 - 2;
                    mainShip.rotation.x = Math.sin(time * 0.5) * 0.01;
                    mainShip.rotation.z = 0;
                }
                if (companionShip) {
                    companionShip.position.y = Math.sin(time * 1.0 + 1) * 0.3 - 2;
                    companionShip.rotation.x = Math.sin(time * 0.5 + 1) * 0.01;
                    companionShip.rotation.z = -0.05;
                }
            }

            // --- SHIP BOBBING (Active mainly in Scene 2) ---
            if (currentScene === 2) {
                if (mainShip) {
                    mainShip.position.y = Math.sin(time * 1.5) * 1.5 - 2;
                    mainShip.rotation.x = Math.sin(time * 1.2) * 0.05;
                    mainShip.rotation.z = Math.sin(time * 0.8) * 0.05;
                }
                if (companionShip) {
                    companionShip.position.y = Math.sin(time * 1.5 + 1) * 1.5 - 2;
                    companionShip.rotation.x = Math.sin(time * 1.2 + 1) * 0.05;
                    companionShip.rotation.z = Math.sin(time * 0.8 + 1) * 0.05 - 0.05;
                }
            }

            // --- SMOOTH CAMERA MOVEMENT ---
            camera.position.lerp(cameraTarget, 0.02);
            currentLookAt.lerp(lookAtTarget, 0.02);
            camera.lookAt(currentLookAt);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
