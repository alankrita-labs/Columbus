<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Columbus VR: The Logical Voyage</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div id="map-ui">
            <h3>LOGBOOK PROGRESS</h3>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
        <div id="narration-text">Click the Golden Compass to begin the voyage...</div>
    </div>

    <a-scene cursor="rayOrigin: mouse">
        <a-assets>
            <img id="wood-texture" src="https://cdn.pixabay.com/photo/2016/11/21/17/41/wood-1846738_1280.jpg">
            <audio id="sea-sound" src="https://www.soundjay.com/nature/ocean-wave-1.mp3"></audio>
        </a-assets>

        <a-entity environment="preset: ocean; skyType: gradient; skyColor: #ff9e80; horizonColor: #004d40; lighting: point; lightPosition: 0 5 0"></a-entity>
        <a-sound src="#sea-sound" autoplay="true" loop="true" volume="0.5"></a-sound>

        <a-entity id="ship" position="0 0.2 -5">
            <a-box width="8" depth="16" height="0.4" src="#wood-texture" repeat="2 4"></a-box>
            
            <a-entity id="compass-group" position="0 1.2 -3">
                <a-cylinder id="compass-base" radius="0.4" height="0.2" color="#FFD700"></a-cylinder>
                <a-box id="compass-needle" width="0.05" depth="0.6" height="0.05" color="#D32F2F" position="0 0.11 0"></a-box>
                <a-text value="NAVIGATE" align="center" position="0 0.3 0" color="#FFF" width="4"></a-text>
            </a-entity>

            <a-box id="logbook" position="2 1.1 -2" width="0.6" depth="0.8" height="0.1" color="#f5f5dc" rotation="0 -20 0">
                <a-text value="READ LOG" align="center" position="0 0.1 0" rotation="-90 0 0" color="#000" width="2"></a-text>
            </a-box>
        </a-entity>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor fuse="false" raycaster="objects: #compass-group, #logbook" color="#FFEB3B"></a-cursor>
        </a-entity>
    </a-scene>

    <script src="game.js"></script>
</body>
</html>
